<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - MoviesFun.in</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="mfs-wrap">
  <div class="mfs-topbar">
    <a class="mfs-back" href="index.html">←</a>
    <div class="mfs-topbar-title">Loading...</div>
  </div>

  <div class="mfs-hero">
    <div class="mfs-backdrop">
      <img id="backdropImg" src="" alt="">
      <div class="mfs-backdrop-overlay"></div>
    </div>
    <div class="mfs-hero-inner">
      <div class="mfs-poster">
        <img id="posterImg" src="" alt="">
      </div>
      <div class="mfs-info">
        <div class="mfs-title">Loading Movie...</div>
        <div class="mfs-badges">
          <span class="mfs-badge year">...</span>
          <span class="mfs-badge hd">HD</span>
        </div>
      </div>
    </div>
  </div>

  <div class="mfs-content">
    <div class="mfs-content-body">

      <!-- 🎬 VIDEO PLAYER -->
      <iframe id="moviePlayer"
        width="100%" height="450"
        frameborder="0"
        allowfullscreen
        style="border-radius:12px;">
      </iframe>

      <!-- 📄 DESCRIPTION -->
      <p id="movieDesc">Loading details...</p>

    </div>

    <div style="margin-top:40px; text-align:center;">
      <a href="index.html" style="display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-size:14px; border:1px solid var(--border); padding:12px 24px; border-radius:12px;">
        ← Back to Home
      </a>
    </div>
  </div>
</div>

<script src="assets/js/movies.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const movieId = params.get("id");

const movie = moviesData.find(m => m.id === movieId);

if (movie) {
  // Title
  document.querySelector(".mfs-title").innerText = movie.title;
  document.querySelector(".mfs-topbar-title").innerText = movie.title;

  // Year
  document.querySelector(".year").innerText = movie.year;

  // Description
  document.getElementById("movieDesc").innerText = movie.description;

  // Images
  document.getElementById("posterImg").src = movie.thumb;
  document.getElementById("backdropImg").src = movie.thumb;

  // 🎬 VIDEO PLAYER (MOST IMPORTANT)
  document.getElementById("moviePlayer").src = movie.video;
}
</script>

</body>
</html>

<script src="assets/js/movies.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
