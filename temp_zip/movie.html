<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details - MoviesFun.in</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="mfs-wrap">
  <div class="mfs-topbar">
    <a class="mfs-back" href="index.html">←</a>
    <div class="mfs-topbar-title">Loading...</div>
  </div>

  <div class="mfs-hero">
    <div class="mfs-backdrop">
      <img src="" alt="">
      <div class="mfs-backdrop-overlay"></div>
    </div>
    <div class="mfs-hero-inner">
      <div class="mfs-poster">
        <img src="" alt="">
      </div>
      <div class="mfs-info">
        <div class="mfs-title">Loading Movie...</div>
        <div class="mfs-badges">
          <span class="mfs-badge year">...</span>
          <span class="mfs-badge hd">HD</span>
        </div>
      </div>
    </div>
  </div>

  <div class="mfs-content">
    <div class="mfs-content-body">
      <p>Loading details...</p>
    </div>
    <div style="margin-top:40px; text-align:center;">
      <a href="index.html" style="display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-size:14px; border:1px solid var(--border); padding:12px 24px; border-radius:12px;">← Back to Home</a>
    </div>
  </div>
</div>

<script src="assets/js/movies.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
