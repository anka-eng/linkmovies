<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8710423330759174"
     crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoviesFun.in -Latest-Movies</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <meta name="description" content="Watch latest movies online for free on MoviesFun.in. High quality streaming and downloads.">
</head>
<body>

<div id="mf-wrap">

  <!-- HEADER -->
  <header id="mf-header">
    <div class="mf-header-top">
      <a class="mf-logo" href="index.html">
        <div class="mf-logo-icon">M</div>
        <span class="mf-logo-text">Movies<span>Fun.in</span></span>
      </a>
    </div>
    <div class="mf-search-bar">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="mfSearchInput" placeholder="Search movies...">
    </div>
  </header>

  <!-- HOME VIEW -->
  <div id="mf-home-view">

    <!-- SEARCH RESULTS -->
    <div id="mf-search-section">
      <div class="mf-section-header" style="padding-top:24px">
        <div class="mf-section-title">Search Results</div>
        <span class="mf-see-all" id="mfSearchCount"></span>
      </div>
      <div class="mf-grid-section">
        <div class="mf-movies-grid" id="mfSearchGrid"></div>
      </div>
      <div style="height:100px"></div>
    </div>

    <!-- LATEST RELEASES -->
    <div class="mf-section">
      <div class="mf-section-header">
        <div class="mf-section-title">Latest Releases</div>
        <a class="mf-see-all" href="#">See All →</a>
      </div>
      <div class="mf-cards-scroll" id="mfLatestCards">
        <!-- JS rendered -->
      </div>
    </div>

    <!-- ALL MOVIES -->
    <div class="mf-section">
      <div class="mf-section-header">
        <div class="mf-section-title">All Movies</div>
        <span class="mf-see-all" id="mfTotalCount"></span>
      </div>
      <div class="mf-grid-section">
        <div class="mf-movies-grid" id="mfAllGrid">
          <!-- JS rendered -->
        </div>
      </div>
    </div>

    <div style="height: 100px;"></div>
  </div><!-- #mf-home-view -->

  <!-- SAVED VIEW -->
  <div id="mf-saved-view">
    <div class="mf-saved-header">❤️ Liked Movies</div>
    <div class="mf-grid-section">
      <div class="mf-movies-grid" id="mfSavedGrid"></div>
    </div>
    <div style="height: 100px;"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="mf-bottom-nav">
    <div class="mf-nav-item active" id="mf-nav-home" onclick="mfShowHome()">
      <div class="mf-nav-icon">🏠</div>
      <div class="mf-nav-label">Home</div>
    </div>
    <div class="mf-nav-item" id="mf-nav-saved" onclick="mfShowSaved()">
      <div class="mf-nav-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="mf-heart-nav"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div class="mf-nav-label">Saved</div>
    </div>
  </nav>

</div><!-- #mf-wrap -->

<div id="mfToast"></div>

<script src="assets/js/movies.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
